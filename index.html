    // -------------------- GOOGLE SHEETS API --------------------
    async function loadSheetData() {
        showStatus("Caricamento dati dal foglio...", "loading");
        try {
            const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Classifica!A:I?access_token=${accessToken}`);
            const data = await response.json();
            if (data.values && data.values.length > 1) {
                for (let i = 1; i < data.values.length && i <= SQUADRE.length; i++) {
                    const row = data.values[i];
                    const squadra = SQUADRE[i-1];
                    if (classificaSquadre[squadra]) {
                        classificaSquadre[squadra] = {
                            punti: parseInt(row[1]) || 0,
                            partite: parseInt(row[2]) || 0,
                            vittorie: parseInt(row[3]) || 0,
                            pareggi: parseInt(row[4]) || 0,
                            sconfitte: parseInt(row[5]) || 0,
                            gol_fatti: parseInt(row[6]) || 0,
                            gol_subiti: parseInt(row[7]) || 0,
                            diff_reti: parseInt(row[8]) || 0
                        };
                    }
                }
            }
            showStatus("Dati caricati!", "success");
            render();
        } catch (error) {
            console.error(error);
            showStatus("Errore caricamento - uso dati locali", "error");
            render();
        }
    }

    async function saveToSheet() {
        showStatus("Salvataggio...", "loading");
        try {
            const classificaData = [["Squadra", "Punti", "G", "V", "N", "S", "GF", "GS", "Diff"]];
            SQUADRE.forEach(s => {
                const c = classificaSquadre[s];
                classificaData.push([s, c.punti, c.partite, c.vittorie, c.pareggi, c.sconfitte, c.gol_fatti, c.gol_subiti, c.diff_reti]);
            });
            
            await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Classifica!A:I?valueInputOption=RAW`, {
                method: "PUT",
                headers: { "Authorization": `Bearer ${accessToken}`, "Content-Type": "application/json" },
                body: JSON.stringify({ values: classificaData })
            });
            showStatus("Salvato!", "success");
            setTimeout(() => showStatus("", ""), 2000);
        } catch (error) {
            console.error(error);
            showStatus("Errore salvataggio", "error");
        }
    }

    // -------------------- FUNZIONI AGGIORNAMENTO --------------------
    function aggiungiGolGiocatore(nome, delta) {
        let g = giocatoriMap.get(nome);
        if(g) { g.gol = Math.max(0, g.gol + delta); giocatoriMap.set(nome, g); saveToSheet(); render(); }
    }

    function aggiungiCartellino(nome, tipo) {
        let g = giocatoriMap.get(nome);
        if(g) {
            if(tipo === 'giallo') g.gialli++;
            if(tipo === 'rosso') g.rossi++;
            if(tipo === 'autogol') g.autogol++;
            giocatoriMap.set(nome, g); saveToSheet(); render();
        }
    }

    function aggiungiStatGM(nome, field, delta) {
        let gm = gmMap.get(nome);
        if(gm) { gm[field] = Math.max(0, gm[field] + delta); gmMap.set(nome, gm); saveToSheet(); render(); }
    }

    function aggiungiStatPortiere(nome, field, delta) {
        let p = portieriMap.get(nome);
        if(p) { p[field] = Math.max(0, p[field] + delta); portieriMap.set(nome, p); saveToSheet(); render(); }
    }

    function applicaRisultatoPartita(home, away, goalHome, goalAway) {
        const cHome = classificaSquadre[home], cAway = classificaSquadre[away];
        cHome.gol_fatti += goalHome; cHome.gol_subiti += goalAway;
        cAway.gol_fatti += goalAway; cAway.gol_subiti += goalHome;
        cHome.partite++; cAway.partite++;
        if(goalHome > goalAway) { cHome.vittorie++; cAway.sconfitte++; }
        else if(goalAway > goalHome) { cAway.vittorie++; cHome.sconfitte++; }
        else { cHome.pareggi++; cAway.pareggi++; }
        cHome.punti = cHome.vittorie*3 + cHome.pareggi;
        cAway.punti = cAway.vittorie*3 + cAway.pareggi;
        cHome.diff_reti = cHome.gol_fatti - cHome.gol_subiti;
        cAway.diff_reti = cAway.gol_fatti - cAway.gol_subiti;

        const portiereHome = Array.from(portieriMap.values()).find(p => p.squadra === home);
        const portiereAway = Array.from(portieriMap.values()).find(p => p.squadra === away);
        if(portiereHome) portiereHome.gol_subiti = (portiereHome.gol_subiti || 0) + goalAway;
        if(portiereAway) portiereAway.gol_subiti = (portiereAway.gol_subiti || 0) + goalHome;
        if(goalAway === 0 && portiereHome) portiereHome.clean_sheet = (portiereHome.clean_sheet || 0) + 1;
        if(goalHome === 0 && portiereAway) portiereAway.clean_sheet = (portiereAway.clean_sheet || 0) + 1;
    }

    // -------------------- RENDER --------------------
    function renderTeamStats(squadra, prefix) {
        const giocatori = Array.from(giocatoriMap.values()).filter(g => g.squadra === squadra);
        const portiere = Array.from(portieriMap.values()).find(p => p.squadra === squadra);
        const gm = Array.from(gmMap.values()).find(g => g.squadra === squadra);
        let html = `<div class="players-list"><strong>⚽ Giocatori</strong>`;
        giocatori.forEach(g => {
            html += `<div class="player-row" data-team="${prefix}">
                <span class="player-name">${g.nome}</span>
                <div class="stat-control">
                    <button class="player-gol-dec" data-player="${g.nome}" data-prefix="${prefix}">-</button>
                    <span class="player-gol-val" data-player="${g.nome}" data-prefix="${prefix}">0</span>
                    <button class="player-gol-inc" data-player="${g.nome}" data-prefix="${prefix}">+</button>
                    <span>Gol</span>
                </div>
                <button class="icon-btn" data-player="${g.nome}" data-card="giallo" data-prefix="${prefix}" title="Cartellino Giallo">🟨</button>
                <button class="icon-btn" data-player="${g.nome}" data-card="rosso" data-prefix="${prefix}" title="Cartellino Rosso">🟥</button>
                <button class="icon-btn" data-player="${g.nome}" data-card="autogol" data-prefix="${prefix}" title="Autogol">🔄🥅</button>
                <span class="badge">🟨${g.gialli} 🟥${g.rossi} OG${g.autogol}</span>
            </div>`;
        });
        html += `</div>`;
        if(portiere) {
            html += `<div class="keeper-card" data-team="${prefix}"><strong>🧤 Portiere: ${portiere.nome}</strong>
                <div class="keeper-row">
                    <div class="stat-control">
                        <button class="portiere-dec" data-portiere="${portiere.nome}" data-field="rigori_parati" data-prefix="${prefix}">-</button>
                        <span class="portiere-val" data-field="rigori_parati" data-portiere="${portiere.nome}" data-prefix="${prefix}">0</span>
                        <button class="portiere-inc" data-portiere="${portiere.nome}" data-field="rigori_parati" data-prefix="${prefix}">+</button>
                        <span>Rigori parati</span>
                    </div>
                    <div class="stat-control">
                        <button class="portiere-dec" data-portiere="${portiere.nome}" data-field="rigori_gm_parati" data-prefix="${prefix}">-</button>
                        <span class="portiere-val" data-field="rigori_gm_parati" data-portiere="${portiere.nome}" data-prefix="${prefix}">0</span>
                        <button class="portiere-inc" data-portiere="${portiere.nome}" data-field="rigori_gm_parati" data-prefix="${prefix}">+</button>
                        <span>Rigori GM parati</span>
                    </div>
                    <div class="stat-control">
                        <button class="portiere-dec" data-portiere="${portiere.nome}" data-field="gol_fatti" data-prefix="${prefix}">-</button>
                        <span class="portiere-val" data-field="gol_fatti" data-portiere="${portiere.nome}" data-prefix="${prefix}">0</span>
                        <button class="portiere-inc" data-portiere="${portiere.nome}" data-field="gol_fatti" data-prefix="${prefix}">+</button>
                        <span>Gol fatti</span>
                    </div>
                </div>
            </div>`;
        }
        if(gm) {
            html += `<div class="gm-list" data-team="${prefix}"><strong><span class="gm-logo">🎀</span> GM: ${gm.nome}</strong>
                <div class="gm-row">
                    <div class="stat-control">
                        <button class="gm-dec" data-gm="${gm.nome}" data-field="gol_fatti" data-prefix="${prefix}">-</button>
                        <span class="gm-val" data-field="gol_fatti" data-gm="${gm.nome}" data-prefix="${prefix}">0</span>
                        <button class="gm-inc" data-gm="${gm.nome}" data-field="gol_fatti" data-prefix="${prefix}">+</button>
                        <span>Gol fatti</span>
                    </div>
                    <div class="stat-control">
                        <button class="gm-dec" data-gm="${gm.nome}" data-field="rigori_tirati" data-prefix="${prefix}">-</button>
                        <span class="gm-val" data-field="rigori_tirati" data-gm="${gm.nome}" data-prefix="${prefix}">0</span>
                        <button class="gm-inc" data-gm="${gm.nome}" data-field="rigori_tirati" data-prefix="${prefix}">+</button>
                        <span>Rigori tirati</span>
                    </div>
                    <div class="stat-control">
                        <button class="gm-dec" data-gm="${gm.nome}" data-field="rigori_sbagliati" data-prefix="${prefix}">-</button>
                        <span class="gm-val" data-field="rigori_sbagliati" data-gm="${gm.nome}" data-prefix="${prefix}">0</span>
                        <button class="gm-inc" data-gm="${gm.nome}" data-field="rigori_sbagliati" data-prefix="${prefix}">+</button>
                        <span>Rigori sbagliati</span>
                    </div>
                </div>
            </div>`;
        }
        return html;
    }

    function raccogliStatisticheSquadra(matchDiv, squadra) {
        const sections = matchDiv.querySelectorAll('.team-section');
        let targetSection = null;
        for(let sec of sections) {
            if(sec.querySelector('.team-name')?.innerText.includes(squadra)) {
                targetSection = sec;
                break;
            }
        }
        if(!targetSection) return { giocatori: [], cartellini: [], gm: [], portieri: [] };
        const giocatori = [];
        targetSection.querySelectorAll('.player-row').forEach(row => {
            const nome = row.querySelector('.player-gol-inc')?.dataset.player;
            if(nome) {
                const golSpan = row.querySelector('.player-gol-val');
                const gol = parseInt(golSpan?.innerText || '0');
                if(gol>0) giocatori.push({ nome, gol });
            }
        });
        const gm = [];
        const gmRow = targetSection.querySelector('.gm-list');
        if(gmRow) {
            const nome = gmRow.querySelector('.gm-inc')?.dataset.gm;
            if(nome) {
                const gol = parseInt(gmRow.querySelector('.gm-val[data-field="gol_fatti"]')?.innerText || '0');
                const rigoriTirati = parseInt(gmRow.querySelector('.gm-val[data-field="rigori_tirati"]')?.innerText || '0');
                const rigoriSbagliati = parseInt(gmRow.querySelector('.gm-val[data-field="rigori_sbagliati"]')?.innerText || '0');
                gm.push({ nome, gol: gol, rigoriTirati, rigoriSbagliati });
            }
        }
        const portieri = [];
        const keeperRow = targetSection.querySelector('.keeper-card');
        if(keeperRow) {
            const nome = keeperRow.querySelector('.portiere-inc')?.dataset.portiere;
            if(nome) {
                const rigoriParati = parseInt(keeperRow.querySelector('.portiere-val[data-field="rigori_parati"]')?.innerText || '0');
                const rigoriGmParati = parseInt(keeperRow.querySelector('.portiere-val[data-field="rigori_gm_parati"]')?.innerText || '0');
                const golFatti = parseInt(keeperRow.querySelector('.portiere-val[data-field="gol_fatti"]')?.innerText || '0');
                portieri.push({ nome, rigoriParati, rigoriGmParati, golFatti });
            }
        }
        return { giocatori, cartellini: [], gm, portieri };
    }

    function resettaCampiSquadra(matchDiv, squadra) {
        const sections = matchDiv.querySelectorAll('.team-section');
        let targetSection = null;
        for(let sec of sections) {
            if(sec.querySelector('.team-name')?.innerText.includes(squadra)) {
                targetSection = sec;
                break;
            }
        }
        if(!targetSection) return;
        targetSection.querySelectorAll('.player-gol-val').forEach(span => span.innerText = '0');
        targetSection.querySelectorAll('.gm-val').forEach(span => span.innerText = '0');
        targetSection.querySelectorAll('.portiere-val').forEach(span => span.innerText = '0');
    }

    function renderClassifica() {
        const sorted = SQUADRE.map(s => ({ nome: s, ...classificaSquadre[s] }))
            .sort((a,b) => b.punti - a.punti || b.diff_reti - a.diff_reti);
        const container = document.getElementById("classificaContainer");
        container.innerHTML = `
            <h3>📊 Classifica</h3>
            <tr>
                <thead><tr><th>Squadra</th><th>Pti</th><th>G</th><th>V</th><th>N</th><th>S</th><th>GF</th><th>GS</th><th>DR</th></tr></thead>
                <tbody>
                    ${sorted.map(s => `<tr><td style="text-align:left">${s.nome}</td><td>${s.punti}</td><td>${s.partite}</td><td>${s.vittorie}</td><td>${s.pareggi}</td><td>${s.sconfitte}</td><td>${s.gol_fatti}</td><td>${s.gol_subiti}</td><td>${s.diff_reti}</td>`).join('')}
                </tbody>
            </table>
        `;
    }

    function render() {
        const giornata = parseInt(document.getElementById("giornataSelect")?.value || 1);
        const partite = calendario[giornata];
        const container = document.getElementById("partiteContainer");
        if (!container) return;
        container.innerHTML = "";

        partite.forEach((p, idx) => {
            const home = p.home, away = p.away;
            const alreadySaved = partiteSalvate.has(`${giornata}_${idx}`);
            const matchDiv = document.createElement("div");
            matchDiv.className = "match-card";
            matchDiv.innerHTML = `
                <div class="match-header">
                    <div class="squadre">
                        <div class="team-badge" data-team="${home}">
                            <img class="team-logo" src="${teamLogos[home]}" alt="${home}" onerror="this.style.display='none'">
                            <span>${home}</span>
                        </div>
                        <span class="vs">VS</span>
                        <div class="team-badge" data-team="${away}">
                            <img class="team-logo" src="${teamLogos[away]}" alt="${away}" onerror="this.style.display='none'">
                            <span>${away}</span>
                        </div>
                    </div>
                    <div class="risultato-control">
                        <div class="goal-control"><button class="home-dec">-</button><span class="home-goal">0</span><button class="home-inc">+</button><span>🏠</span></div>
                        <div class="goal-control"><button class="away-dec">-</button><span class="away-goal">0</span><button class="away-inc">+</button><span>✈️</span></div>
                    </div>
                </div>
                <div class="team-section"><div class="team-name"><img class="small-logo" src="${teamLogos[home]}" alt="${home}" onerror="this.style.display='none'"> ${home}</div>${renderTeamStats(home, `${giornata}_${idx}_home`)}</div>
                <div class="team-section"><div class="team-name"><img class="small-logo" src="${teamLogos[away]}" alt="${away}" onerror="this.style.display='none'"> ${away}</div>${renderTeamStats(away, `${giornata}_${idx}_away`)}</div>
                <button class="save-btn" ${alreadySaved ? 'disabled' : ''}>✓</button>
            `;
            container.appendChild(matchDiv);

            const homeGoalSpan = matchDiv.querySelector(".home-goal");
            const awayGoalSpan = matchDiv.querySelector(".away-goal");
            const homeInc = matchDiv.querySelector(".home-inc");
            const homeDec = matchDiv.querySelector(".home-dec");
            const awayInc = matchDiv.querySelector(".away-inc");
            const awayDec = matchDiv.querySelector(".away-dec");
            const homeBadge = matchDiv.querySelector(`.team-badge[data-team="${home}"]`);
            const awayBadge = matchDiv.querySelector(`.team-badge[data-team="${away}"]`);

            let homeGol = 0, awayGol = 0;
            const updateUI = () => {
                homeGoalSpan.innerText = homeGol;
                awayGoalSpan.innerText = awayGol;
                if (homeGol > awayGol) {
                    homeBadge.classList.add("winner");
                    homeBadge.classList.remove("loser");
                    awayBadge.classList.add("loser");
                    awayBadge.classList.remove("winner");
                } else if (awayGol > homeGol) {
                    awayBadge.classList.add("winner");
                    awayBadge.classList.remove("loser");
                    homeBadge.classList.add("loser");
                    homeBadge.classList.remove("winner");
                } else {
                    homeBadge.classList.remove("winner", "loser");
                    awayBadge.classList.remove("winner", "loser");
                }
            };
            homeInc.onclick = () => { homeGol++; updateUI(); };
            homeDec.onclick = () => { if(homeGol>0) homeGol--; updateUI(); };
            awayInc.onclick = () => { awayGol++; updateUI(); };
            awayDec.onclick = () => { if(awayGol>0) awayGol--; updateUI(); };
            updateUI();

            const saveBtn = matchDiv.querySelector(".save-btn");
            saveBtn.onclick = () => {
                if(partiteSalvate.has(`${giornata}_${idx}`)) { alert("Partita già salvata!"); return; }
                const homeStats = raccogliStatisticheSquadra(matchDiv, home);
                const awayStats = raccogliStatisticheSquadra(matchDiv, away);
                applicaRisultatoPartita(home, away, homeGol, awayGol);
                homeStats.giocatori.forEach(g => aggiungiGolGiocatore(g.nome, g.gol));
                awayStats.giocatori.forEach(g => aggiungiGolGiocatore(g.nome, g.gol));
                homeStats.gm.forEach(gm => { aggiungiStatGM(gm.nome, "gol_fatti", gm.gol); aggiungiStatGM(gm.nome, "rigori_tirati", gm.rigoriTirati); aggiungiStatGM(gm.nome, "rigori_sbagliati", gm.rigoriSbagliati); });
                awayStats.gm.forEach(gm => { aggiungiStatGM(gm.nome, "gol_fatti", gm.gol); aggiungiStatGM(gm.nome, "rigori_tirati", gm.rigoriTirati); aggiungiStatGM(gm.nome, "rigori_sbagliati", gm.rigoriSbagliati); });
                homeStats.portieri.forEach(p => { aggiungiStatPortiere(p.nome, "rigori_parati", p.rigoriParati); aggiungiStatPortiere(p.nome, "rigori_gm_parati", p.rigoriGmParati); aggiungiStatPortiere(p.nome, "gol_fatti", p.golFatti); });
                awayStats.portieri.forEach(p => { aggiungiStatPortiere(p.nome, "rigori_parati", p.rigoriParati); aggiungiStatPortiere(p.nome, "rigori_gm_parati", p.rigoriGmParati); aggiungiStatPortiere(p.nome, "gol_fatti", p.golFatti); });

                partiteSalvate.set(`${giornata}_${idx}`, true);
                saveToSheet();
                homeGol = 0; awayGol = 0; updateUI();
                resettaCampiSquadra(matchDiv, home);
                resettaCampiSquadra(matchDiv, away);
                saveBtn.disabled = true;
                render();
            };
        });
        renderClassifica();
    }

    function populateGiornate() {
        const select = document.getElementById("giornataSelect");
        if (!select) return;
        for(let i=1; i<=7; i++) {
            const opt = document.createElement("option");
            opt.value = i;
            opt.innerText = `Giornata ${i}`;
            select.appendChild(opt);
        }
        select.addEventListener("change", () => render());
    }

    // -------------------- LOGIN CALLBACK --------------------
    window.handleCredentialResponse = (response) => {
        console.log("Login successo!");
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        currentUser = payload.email;
        accessToken = response.credential;
        
        isLoggedIn = true;
        
        document.getElementById("loginSection").innerHTML = `
            <div class="user-info">
                <span>👤 ${currentUser}</span>
                <button id="logoutBtn" class="logout-btn">🚪 Esci</button>
            </div>
            <div id="statusMsg" class="status"></div>
        `;
        document.getElementById("appContent").style.display = "block";
        
        document.getElementById("logoutBtn").addEventListener("click", () => {
            isLoggedIn = false;
            location.reload();
        });
        
        showStatus("Login effettuato! Caricamento...", "success");
        initData();
        loadSheetData();
    };

    // -------------------- INIT --------------------
    populateGiornate();
</script>
